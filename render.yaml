services:
  - type: web
    name: portfolio-django
    env: python
    plan: free
    buildCommand: "bash build.sh"
    startCommand: "gunicorn portfolio.wsgi:application"
    autoDeploy: true
    envVars:
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        fromService:
          type: web
          name: portfolio-django
          property: host
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://portfolio-django.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true

databases:
  - name: portfolio-db
    databaseName: portfolio_db
    user: portfolio_user
    plan: free
